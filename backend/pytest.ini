[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试（默认跳过）

[coverage:run]
source = backend
branch = true
omit =
    backend/__pycache__/*
    backend/*/__pycache__/*
    backend/main.py
    backend/tests/*
    backend/data/*

[coverage:report]
show_missing = true
skip_covered = false
precision = 1
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    \.\.\.

[coverage:paths]
source =
    backend
    /home/fz/project/sage/backend

[coverage:html]
directory = backend/.coverage_html
