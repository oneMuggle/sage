# Sage 配置文件

app:
  name: 'Sage'
  version: '1.0.0'
  debug: true

# 数据库配置
database:
  path: 'data/sage.db'
  wal_mode: true

# LLM 配置
llm:
  provider: 'openai'
  model: 'gpt-3.5-turbo'
  api_key: ''
  base_url: ''

# 记忆系统配置
memory:
  working:
    max_size: 20
    max_tokens: 4000
  episodic:
    max_memories: 1000
    default_importance: 5
  semantic:
    max_memories: 500

# 进化系统配置
evolution:
  enabled: true
  tasks:
    daily_summary:
      enabled: true
      time: '03:00'
      min_messages: 3
    memory_pruning:
      enabled: true
      time: '03:30'
      max_memories: 1000
    preference_learning:
      enabled: true
      time: '02:00'
    importance_reevaluation:
      enabled: true
      day: 'sunday'
      time: '04:00'

# 调度器配置
scheduler:
  check_interval: 60 # 检查间隔（秒）

# M2 工具执行策略（方案 §3.2）；字段缺省即 ToolPolicy() 默认值。
# 字段语义见 backend/domain/tool_policy.py。
tools:
  timeout_seconds: 30.0        # 工具中心超时（覆盖分散硬编码）
  max_output_bytes: 256000     # 单次工具输出 byte 上限
  max_result_items: 200        # list/search 类条数上限
  max_read_bytes: 2000000      # read_file 字节上限
  max_tool_calls_per_run: 25   # 单次 run 工具调用总数守卫
