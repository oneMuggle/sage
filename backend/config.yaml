# Sage 配置文件

app:
  name: 'Sage'
  version: '1.0.0'
  debug: true

# 数据库配置
database:
  path: 'data/sage.db'
  wal_mode: true

# LLM 配置
llm:
  provider: 'openai'
  model: 'gpt-3.5-turbo'
  api_key: ''
  base_url: ''

# 记忆系统配置
memory:
  working:
    max_size: 20
    max_tokens: 4000
  episodic:
    max_memories: 1000
    default_importance: 5
  semantic:
    max_memories: 500

# 进化系统配置
evolution:
  enabled: true
  tasks:
    daily_summary:
      enabled: true
      time: '03:00'
      min_messages: 3
    memory_pruning:
      enabled: true
      time: '03:30'
      max_memories: 1000
    preference_learning:
      enabled: true
      time: '02:00'
    importance_reevaluation:
      enabled: true
      day: 'sunday'
      time: '04:00'

# 调度器配置
scheduler:
  check_interval: 60 # 检查间隔（秒）
