# backend/ruff.toml
target-version = "py311"
line-length = 100
extend-exclude = [".venv", "__pycache__", ".ruff_cache", "data"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "DTZ", # flake8-datetimez
    "T20", # flake8-print
    "PT",  # flake8-pytest-style
    "Q",   # flake8-quotes
    "RET", # flake8-return
    "SIM", # flake8-simplify
    "TID", # flake8-tidy-imports
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib
    "ERA", # eradicate (commented-out code)
    "PL",  # pylint
]
ignore = [
    "E501",     # line-too-long (handled by formatter)
    "PLR0913",  # too-many-arguments
    "PLR2004",  # magic-value-comparison
    "B904",     # raise without from — best practice but not a bug
    "ARG002",   # unused method arg — common in FastAPI handlers
    "ARG001",   # unused function arg
    "TID252",   # prefer absolute imports — project uses relative in some places
    "B008",     # function call in default argument — FastAPI Depends() pattern
    "N806",     # variable in function should be lowercase — N/A for test classes
    "PLR0912",  # too many branches
    "PLR0915",  # too many statements
    "DTZ005",   # datetime.now() no tz — to be addressed in P3 observability
    "DTZ006",   # datetime.fromtimestamp() no tz
    "RET505",   # superfluous elif after return
    "RET506",   # superfluous elif after raise
    "E402",     # module level import not at top — necessary in some cases
    "PTH118",   # os.path.join → Path /  — migration, not urgent
    "PTH119",   # os.path.relpath → Path.relative_to
    "PTH100",   # os.path.abspath → Path.resolve
    "PTH103",   # os.path.directory → Path /  — not a bug
    "PTH108",   # os.path.basename → Path.name
    "PTH110",   # os.path.exists → Path.exists
    "PTH112",   # os.path.isfile → Path.is_file
    "PTH120",   # os.path.join → Path /
    "PTH123",   # builtin open → Path.open
    "B905",     # zip-without-explicit-strict — py38 LTS can't accept strict= kwarg (PEP 618)
    "UP038",    # Use X | Y in isinstance — py38 LTS can't evaluate PEP 604 at runtime
        "PLW0602",  # global variable not assigned
    "PLW0603",  # global variable assigned but never used
    # UP006/UP007/UP035 disabled to keep backend/ PEP 604/585 syntax
    # (X | Y, list[X]) compatible with both Python 3.11 (main) and
    # Python 3.8 (release/win7 LTS bundles). The rewriter
    # scripts/py38_compat_rewrite.py intentionally converts all PEP 604/585
    # to typing.* equivalents so both branches share identical
    # annotations; UP006/007/035 would auto-fix them back on main and
    # silently re-introduce the divergence. Keep disabled until either
    # branch drops Py3.8 support.
    "UP006",  # Use `list` instead of `List` — prefer typing.List for Py3.8 compat
    "UP007",  # Use `X | Y` for type annotations — prefer typing.Union for Py3.8 compat
    "UP035",  # `typing.Dict` is deprecated, use `dict` — prefer typing.Dict for Py3.8 compat
]

[lint.per-file-ignores]
"tests/**/*.py" = ["PLR2004", "S101", "ARG"]
"__init__.py" = ["F401"]

[lint.isort]
known-first-party = ["backend"]
combine-as-imports = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
