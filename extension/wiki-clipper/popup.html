<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Sage Wiki Clipper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1e293b;
      background: #ffffff;
    }
    h1 { font-size: 16px; margin-bottom: 12px; }
    .field { margin-bottom: 10px; }
    label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px; color: #475569; }
    input, textarea, select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 13px;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; }
    textarea { min-height: 60px; resize: vertical; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    button {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status.info { background: #dbeafe; color: #1e40af; }
    .settings-link {
      font-size: 12px;
      color: #3b82f6;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>📚 Sage Wiki Clipper</h1>

  <div class="field">
    <label>API URL</label>
    <input type="text" id="apiUrl" placeholder="http://127.0.0.1:8765/api/v1" />
  </div>

  <div class="field">
    <label>项目路径</label>
    <input type="text" id="projectPath" placeholder="/path/to/wiki/project" />
  </div>

  <div class="field">
    <label>页面标题</label>
    <input type="text" id="pageTitle" placeholder="页面标题" />
  </div>

  <div class="field">
    <label>URL</label>
    <input type="text" id="pageUrl" readonly />
  </div>

  <div class="field">
    <label>备注（可选）</label>
    <textarea id="notes" placeholder="添加一些备注..."></textarea>
  </div>

  <div class="field">
    <label>
      <input type="checkbox" id="autoIngest" checked />
      自动 Ingest 到 Wiki
    </label>
  </div>

  <button class="btn-primary" id="clipButton">保存到 Wiki</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
