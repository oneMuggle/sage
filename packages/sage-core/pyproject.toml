[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sage-core"
version = "0.1.0"
description = "Sage 核心领域模型 - 零外部依赖的纯 Python 实现"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Sage Team", email = "team@sage.dev"}
]
maintainers = [
    {name = "Sage Team", email = "team@sage.dev"}
]
keywords = ["ai", "assistant", "memory", "agent", "core"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.10"
dependencies = []  # 零外部依赖！

[project.urls]
Homepage = "https://github.com/your-repo/sage"
Documentation = "https://github.com/your-repo/sage/tree/main/packages/sage-core"
Repository = "https://github.com/your-repo/sage"
Issues = "https://github.com/your-repo/sage/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["sage_core*"]

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.black]
line-length = 88
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --cov=sage_core --cov-report=term-missing"
