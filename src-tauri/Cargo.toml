[package]
name = "sage"
version = "0.1.0"
description = "记忆型 AI 桌面助手"
authors = ["Sage Team"]
license = "MIT"
repository = ""
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "sage_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "1.5", features = [] }
# 阻止 embed-resource 2.5+ 拉入 toml_edit 0.22.27 → hashbrown 0.17
embed-resource = ">=2.1, <2.5"

[dependencies]
tauri = { version = "1.6", features = ["shell-open", "windows7-compat"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = ">=1, <1.39", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
chrono = { version = ">=0.4, <0.4.39", features = ["serde"] }
uuid = { version = ">=1.0, <1.20", features = ["v4", "serde"] }
getrandom = ">=0.2, <0.3"
# 阻止 indexmap 2.7+ (需要 edition2024) 被拉入
indexmap = ">=1.9, <2.7"
# 阻止 ignore/globset 最新版 (需要 edition2024) 被拉入
ignore = ">=0.4, <0.4.23"
globset = ">=0.4, <0.4.16"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
