[package]
name = "sage"
version = "0.1.0"
description = "记忆型 AI 桌面助手"
authors = ["Sage Team"]
license = "MIT"
repository = ""
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "sage_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }
# 阻止 embed-resource 2.5+ 拉入 toml_edit 0.22 → hashbrown 0.15
embed-resource = ">=2.1, <2.4.1"

[dependencies]
tauri = { version = "2" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = ">=1, <1.39", features = ["full"] }
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }
chrono = { version = ">=0.4, <0.4.39", features = ["serde"] }
uuid = { version = ">=1.0, <1.20", features = ["v4", "serde"] }
# 强制所有 hashbrown 走 0.14.x，避免 0.15+ (需要 edition2024) 被拉入
hashbrown = ">=0.14, <0.15"
# ahash 0.8.12+ 使用 hashbrown 0.15+
ahash = ">=0.8, <0.8.12"
# 阻止 indexmap 2.3+ (使用 hashbrown 0.15+ → edition2024) 被拉入
indexmap = ">=1.9, <2.3"
# 阻止 ignore/globset 最新版 (需要 edition2024) 被拉入
ignore = ">=0.4, <0.4.23"
globset = ">=0.4, <0.4.16"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
