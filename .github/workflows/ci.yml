name: CI

on:
  push:
    branches: [main, develop, release/win7]
  pull_request:
    branches: [main, develop, release/**]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== Backend (Win7 LTS): Python 3.8 兼容性 ==========
  # - 仅 release/win7 触发（保护 win7 钉死的 Python 3.8 兼容性）
  # - 用独立 conda env sage-backend-py38 隔离 main 的 sage-backend
  # - 钉死依赖版本（backend/requirements-py38.txt）
  # - coverage 强门禁 ≥ 80%
  backend-py38:
    name: Backend (Python 3.8, Win7 LTS)
    if: github.ref == 'refs/heads/release/win7'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda + Python 3.8
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.8'
          channels: conda-forge

      - name: Create py38 env
        shell: bash -el {0}
        run: |
          conda create -n sage-backend-py38 python=3.8 -y
          conda run -n sage-backend-py38 pip install --upgrade pip

      - name: Install backend deps (py38, locked)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-py38 pip install -r backend/requirements-py38.txt
          conda run -n sage-backend-py38 pip install ruff mypy import-linter

      - name: Ruff check
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-py38 ruff check backend/

      - name: Pytest (py38, hex mode) with coverage
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-py38 bash -c "cd backend && pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=80"

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend-py38
          fail_ci_if_error: false

  # ========== Backend: lint + type + test + coverage ==========
  backend:
    name: Backend (Python)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: backend/environment.yml
          python-version: '3.11'
          activate-environment: sage-backend
          channels: conda-forge

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dev tools
        shell: bash -el {0}
        run: |
          conda run -n sage-backend pip install ruff mypy import-linter

      - name: Ruff check
        shell: bash -el {0}
        run: |
          conda run -n sage-backend ruff check backend/

      - name: Mypy (domain + ports)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend mypy backend/domain backend/ports
        continue-on-error: true # P0 期间允许，domain/ports 还没建

      # PG2.11：5 层依赖图（hexagonal-architecture contract）
      # - backend/ 是 import-linter 的 root_package
      # - 必须 cd backend 让 import-linter 找到 pyproject.toml
      # - PYTHONPATH=.. 让它能 import "backend.*" 模块
      - name: Import linter (hexagonal architecture)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend bash -c "cd backend && PYTHONPATH=.. lint-imports"

      # PG2.12：双轨回归
      # - 主路径：API_MODE=hex（默认），强制 coverage ≥ 80%，并上传 codecov
      # - 兜底路径：API_MODE=legacy，no-cov 冒烟（continue-on-error，作为安全网）
      - name: Pytest hex (default) with coverage
        shell: bash -el {0}
        run: |
          conda run -n sage-backend bash -c "cd backend && pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=80"

      - name: Pytest legacy (smoke, no-cov)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend bash -c "cd backend && API_MODE=legacy pytest --no-cov -q"
        continue-on-error: true # 兜底：legacy 仅作安全网，单测不一致不阻塞 PR

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ========== Frontend: lint + type + test + coverage ==========
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  # ========== Desktop Build: Electron 21 + electron-builder 矩阵 ==========
  # - 3 OS 矩阵：ubuntu (AppImage) / macos (DMG) / windows (NSIS)
  # - Linux/macOS runner 不能跑 Windows NSIS 产物但能 cross-build；
  #   windows-latest 直接产 NSIS 离线安装包
  # - electron-builder 缓存 npm + Electron 二进制加速构建
  desktop-build:
    name: Electron build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # macOS DMG 暂未启用（Phase 1 electron-builder.yml mac.target: null）
        # 待 Win7 验证后补回: os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Linux build deps (webkit2gtk for Electron cross-build)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend + Electron
        run: npm run electron:build

      - name: Package (Linux AppImage + deb)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux AppImage deb --publish never

      - name: Verify Linux artifacts (vitest)
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:packaging

      - name: Fetch VC++ Redistributable (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: pwsh scripts/fetch-vcredist.ps1

      - name: Package (Windows NSIS)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: |
            release/**/*.exe
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.dmg
          if-no-files-found: error

  # ========== Electron smoke test (Phase 4 lightweight, Win7 真机烟测前替代) ==========
  # - 用 playwright._electron 启动 Electron + 验证 IPC bridge
  # - SAGE_SKIP_BACKEND=1 跳过 FastAPI spawn（CI 无 sage-backend conda env）
  # - 验证项：BrowserWindow 出现 / window.electronAPI 暴露 / 前端 HTML 加载
  # - 截图保存为 artifact 用于人工 review
  # - Win7 真机烟测在 Phase 5 (release 前) 跑 self-hosted Win7 runner
  electron-smoke:
    name: Electron smoke (playwright-electron)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend + Electron
        run: npm run electron:build

      - name: Smoke test
        env:
          SAGE_SKIP_BACKEND: '1'
          CI: 'true'
        run: npx playwright test tests/electron/smoke.spec.ts --reporter=line

      - name: Upload smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-smoke-screenshot
          path: tests/electron/screenshots/*.png
          if-no-files-found: ignore

  # ========== All-checks aggregator ==========
  # - 强门禁：backend + frontend + electron-smoke 全部 success 才算通过
  # - desktop-build 暂不强制门禁（首次跑通优先，后续加 continue-on-error → required）
  all-green:
    name: All Checks
    needs: [backend, backend-py38, frontend, electron-smoke]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check all required jobs passed
        run: |
          set -e
          # 必过项：frontend + electron-smoke
          [ "${{ needs.frontend.result }}" = "success" ]
          [ "${{ needs.electron-smoke.result }}" = "success" ]
          # backend job: main 走 backend, win7 走 backend-py38.
          # skipped (守卫 if 不匹配) 也算 success —— PR 不在 main/win7 上时预期 skip.
          backend_ok=false
          if [ "${{ needs.backend.result }}" = "success" ] || [ "${{ needs.backend.result }}" = "skipped" ]; then
            backend_ok=true
          fi
          backend_py38_ok=false
          if [ "${{ needs.backend-py38.result }}" = "success" ] || [ "${{ needs.backend-py38.result }}" = "skipped" ]; then
            backend_py38_ok=true
          fi
          if [ "$backend_ok" != "true" ] && [ "$backend_py38_ok" != "true" ]; then
            echo "No backend job succeeded"
            exit 1
          fi
          echo "All required checks passed"
