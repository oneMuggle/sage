name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== Backend: lint + type + test + coverage ==========
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: backend/environment.yml
          python-version: '3.11'
          activate-environment: sage-backend
          channels: conda-forge

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dev tools
        shell: bash -el {0}
        run: |
          conda run -n sage-backend pip install ruff mypy import-linter

      - name: Ruff check
        shell: bash -el {0}
        run: |
          conda run -n sage-backend ruff check backend/

      - name: Mypy (domain + ports)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend mypy backend/domain backend/ports
        continue-on-error: true # P0 期间允许，domain/ports 还没建

      # PG2.11：5 层依赖图（hexagonal-architecture contract）
      # - backend/ 是 import-linter 的 root_package
      # - 必须 cd backend 让 import-linter 找到 pyproject.toml
      # - PYTHONPATH=.. 让它能 import "backend.*" 模块
      - name: Import linter (hexagonal architecture)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend bash -c "cd backend && PYTHONPATH=.. lint-imports"

      # PG2.12：双轨回归
      # - 主路径：API_MODE=hex（默认），强制 coverage ≥ 80%，并上传 codecov
      # - 兜底路径：API_MODE=legacy，no-cov 冒烟（continue-on-error，作为安全网）
      - name: Pytest hex (default) with coverage
        shell: bash -el {0}
        run: |
          conda run -n sage-backend bash -c "cd backend && pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=80"

      - name: Pytest legacy (smoke, no-cov)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend bash -c "cd backend && API_MODE=legacy pytest --no-cov -q"
        continue-on-error: true # 兜底：legacy 仅作安全网，单测不一致不阻塞 PR

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ========== Frontend: lint + type + test + coverage ==========
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  # ========== Tauri: 3 平台 build 矩阵（PG3.11 强门禁）==========
  # - P0 阶段是 smoke (continue-on-error)；PG3.11 升级为强门禁
  # - 3 OS 矩阵：ubuntu / windows / macos
  # - 每个平台产出对应包格式：deb+AppImage / msi+exe / dmg+app
  # - Win7 由独立 job 处理（self-hosted runner，手动触发）
  tauri-build:
    name: Tauri 2 build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # Linux: 产 deb + AppImage
      # Windows: 产 msi + exe（默认 targets 含 msi）
      # macOS: 产 dmg + app
      - name: Build Tauri (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx tauri build --bundles deb,appimage

      - name: Build Tauri (Windows)
        if: matrix.os == 'windows-latest'
        run: npx tauri build

      - name: Build Tauri (macOS)
        if: matrix.os == 'macos-latest'
        run: npx tauri build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/sage*
          if-no-files-found: ignore

  # ========== Tauri Win7: 仅手动触发（需自托管 runner）==========
  # - GitHub-hosted runner 不支持 Win7
  # - workflow_dispatch 触发，需 [self-hosted, windows-7] label 的 runner
  # - rust 1.77.2 是 Win7 x86 workaround（spec § 2.3）
  # - 不参与 all-green 强门禁
  tauri-win7:
    name: Tauri 2 on Windows 7 (self-hosted)
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, windows-7]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Win7 compat: Node 20 (LTS)
          cache: 'npm'

      - name: Install Rust (1.77.2 for Win7 workaround)
        uses: dtolnay/rust-toolchain@1.77.2

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (with windows7-compat)
        run: npx tauri build

      - name: Verify sage.exe exists
        shell: bash
        run: |
          if [ -f "src-tauri/target/release/sage.exe" ]; then
            echo "sage.exe built successfully"
            ls -la src-tauri/target/release/sage.exe
          else
            echo "::error::sage.exe not found"
            exit 1
          fi

      - name: Smoke test launch (10 sec, then kill)
        shell: bash
        run: |
          ./src-tauri/target/release/sage.exe &
          SAGE_PID=$!
          sleep 10
          if ps -p $SAGE_PID > /dev/null 2>&1; then
            echo "sage.exe still running after 10s — Win7 launch successful"
            kill $SAGE_PID || true
          else
            echo "::error::sage.exe crashed within 10s"
            exit 1
          fi

      - name: Upload Win7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-win7-exe
          path: src-tauri/target/release/sage.exe
          if-no-files-found: ignore

  # ========== All-checks aggregator ==========
  # - 强门禁：backend + frontend + tauri-build 全部 success 才算通过
  # - tauri-win7 不在此列（需要 self-hosted runner + 手动触发）
  all-green:
    name: All Checks
    needs: [backend, frontend, tauri-build]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.tauri-build.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required checks passed"
