name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== Backend: lint + type + test + coverage ==========
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: backend/environment.yml
          python-version: '3.11'
          activate-environment: sage-backend
          channels: conda-forge

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dev tools
        shell: bash -el {0}
        run: |
          conda run -n sage-backend pip install ruff mypy import-linter

      - name: Ruff check
        shell: bash -el {0}
        run: |
          conda run -n sage-backend ruff check backend/

      - name: Mypy (domain + ports)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend mypy backend/domain backend/ports
        continue-on-error: true # P0 期间允许，domain/ports 还没建

      # PG2.11：5 层依赖图（hexagonal-architecture contract）
      # - backend/ 是 import-linter 的 root_package
      # - 必须 cd backend 让 import-linter 找到 pyproject.toml
      # - PYTHONPATH=.. 让它能 import "backend.*" 模块
      - name: Import linter (hexagonal architecture)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend bash -c "cd backend && PYTHONPATH=.. lint-imports"

      # PG2.12：双轨回归
      # - 主路径：API_MODE=hex（默认），强制 coverage ≥ 80%，并上传 codecov
      # - 兜底路径：API_MODE=legacy，no-cov 冒烟（continue-on-error，作为安全网）
      - name: Pytest hex (default) with coverage
        shell: bash -el {0}
        run: |
          conda run -n sage-backend bash -c "cd backend && pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=80"

      - name: Pytest legacy (smoke, no-cov)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend bash -c "cd backend && API_MODE=legacy pytest --no-cov -q"
        continue-on-error: true # 兜底：legacy 仅作安全网，单测不一致不阻塞 PR

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ========== Frontend: lint + type + test + coverage ==========
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  # ========== Desktop Build: Phase 1 (Electron 21) 占位 ==========
  # - Phase 0 (2026-06-13) 已归档 src-tauri/ 至 archive/src-tauri-2026-06-13-win7-migration/
  # - 原 tauri-build (3 OS 矩阵) + tauri-win7 (self-hosted) job 已删除
  # - 替代方案: Electron 21 + electron-builder,见 docs/technical/XX-electron-win7.md (Phase 6 出)
  # - 当前 job 为占位 (if: false 不执行),Phase 1 实现 electron-builder 矩阵后激活
  desktop-build:
    name: Desktop build (electron, placeholder for Phase 1)
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "TODO Phase 1: electron-builder NSIS pipeline"

  # ========== All-checks aggregator ==========
  # - 强门禁：backend + frontend 全部 success 才算通过
  # - desktop-build 占位未激活,不参与门禁
  all-green:
    name: All Checks
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required checks passed"
