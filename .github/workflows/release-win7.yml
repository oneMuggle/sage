# Sage Windows 7 Release 构建工作流
#
# 仅在 release/win7 分支产出预编译安装包（NSIS + MSI）。
# 触发方式：workflow_dispatch（手动）或 release/win7 分支上的 v*.*.*-win7 tag 推送。
#
# 与 main 的 release.yml 区别：
#   - main: Tauri 2.x / Windows 10+ / macOS / Linux
#   - win7: Tauri 1.6 + webviewInstallMode=offlineInstaller / Windows 7 SP1 x64
#   - 走 GH-hosted windows-latest (Server 2022) 做 cross-build（interim 模式）
#   - 实际 Win7 启动验证由维护者在物理机人工执行（详见 BRANCH_NOTES.md）
#   - build 完不上传 GH Release（手动 workflow_dispatch 模式），仅上传 artifacts
#
# 为什么不自动发 Release：避免和 main 的 release.yml 在同一 tag 上冲突。
# 维护流程：合并到 release/win7 → 在 main 上同号 tag（如 v0.1.0-win7）→ 手动
# 触发此 workflow → 下载 artifacts → 手动创建 GH Release。

name: Release Build (Windows 7)

on:
  push:
    tags:
      - 'v*.*.*-win7'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.0)'
        required: true
        default: '0.1.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ========== Windows 7 专用：GH-hosted windows-latest (Server 2022) cross-build ==========
  # 当前 interim 模式：Win7 self-hosted runner 不可用，使用 cross-build
  # 产物为 Win7 兼容配置（tauri=1.6 + windows7-compat + WebView2 v109 fallback）
  # Win7 实机验证由维护者在物理机人工执行
  build-windows-win7:
    name: Build Windows 7 Installer (cross-build, 需人工 Win7 验证)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Node 20 是 Win7 兼容的 LTS
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Rust 1.77.2 + tauri-build 1.5 (Tauri 1.6 配套)
      - name: Install Rust 1.77.2
        uses: dtolnay/rust-toolchain@1.77.2
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        shell: pwsh
        run: npm ci

      - name: Build frontend
        shell: pwsh
        run: npm run build

      # Tauri 1.6 build：
      #   - webviewInstallMode=offlineInstaller: 自动从微软下载 WebView2 standalone
      #     installer (~127MB) 并 embed（仅 build 时联网，运行时完全离线）
      #   - targets: msi + nsis 双格式
      - name: Build Tauri 1.6 (offline WebView2)
        shell: pwsh
        run: npx tauri build --bundles msi,nsis

      - name: Verify sage.exe exists
        shell: pwsh
        run: |
          if (Test-Path "src-tauri\target\release\sage.exe") {
            Write-Host "sage.exe built successfully"
            Get-Item "src-tauri\target\release\sage.exe" | Format-List
          } else {
            Write-Error "sage.exe not found"
            exit 1
          }

      - name: Verify installer exists
        shell: pwsh
        run: |
          $msi = Get-ChildItem "src-tauri\target\release\bundle\msi\*.msi" -ErrorAction SilentlyContinue
          $nsis = Get-ChildItem "src-tauri\target\release\bundle\nsis\*.exe" -ErrorAction SilentlyContinue
          if (-not $msi -and -not $nsis) {
            Write-Error "No installer artifacts found"
            exit 1
          }
          Write-Host "MSI: $($msi.FullName) ($($msi.Length) bytes)"
          Write-Host "NSIS: $($nsis.FullName) ($($nsis.Length) bytes)"

      - name: List bundle outputs
        shell: pwsh
        run: |
          Write-Host "=== MSI outputs ==="
          Get-ChildItem "src-tauri\target\release\bundle\msi\" -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== NSIS outputs ==="
          Get-ChildItem "src-tauri\target\release\bundle\nsis\" -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload Windows 7 installers (artifacts only, no GH Release)
        uses: actions/upload-artifact@v4
        with:
          name: sage-win7-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Summary
        if: success()
        shell: pwsh
        run: |
          Write-Host "==========================================="
          Write-Host "  Sage Windows 7 Build Successful (cross-build)"
          Write-Host "==========================================="
          Write-Host "Artifacts uploaded as: sage-win7-installer"
          Write-Host ""
          Write-Host "Build 在 windows-latest (Server 2022) 上 cross-build 完成"
          Write-Host "产物配置为 Win7 兼容（tauri 1.6 + windows7-compat + WebView2 v109）"
          Write-Host ""
          Write-Host "下一步："
          Write-Host "  1. 在 GitHub Actions 页面下载 artifact: sage-win7-installer"
          Write-Host "  2. （关键）拷贝到 Windows 7 SP1 x64 物理机双击 .msi/.exe 验证"
          Write-Host "     - 验证 WebView2 v109 自动 fallback"
          Write-Host "     - 验证主窗口出现 + 基本功能可用"
          Write-Host "  3. 人工验证通过后，手动创建 GH Release（tag: v<version>-win7）"
          Write-Host "  4. 上传 .msi 和 .exe 作为 Release assets"
