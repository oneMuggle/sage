# Sage Windows 7 维护分支 CI
#
# 仅在 release/win7 分支生效的 CI：
#   1. backend-py38: Python 3.8 验证（conda env name: sage-backend-win7）
#   2. frontend: Node 20 LTS（Win7 兼容，**不是** Node 25）
#   3. tauri-win7-build: self-hosted windows-7 runner 上跑 Tauri 1.6 build + 10s 冒烟
#
# 设计原则：
#   - 三个 job 全部为强门禁（all-green 才算通过）
#   - tauri-win7-build 是 self-hosted runner（label: windows-7），不在 GH-hosted 跑
#   - Node 选 20 而非 25：Node 23+ 编译产物在 Win7 上可能有问题，20 是 LTS 且安全
#   - Python 3.8 是 Win7 最后支持版本，conda env 需独立创建

name: CI (Windows 7)

on:
  push:
    branches: [release/win7]
  pull_request:
    branches: [release/win7]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== Backend: Python 3.8 + coverage 80% ==========
  backend-py38:
    name: Backend (Python 3.8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda (Python 3.8)
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.8'
          activate-environment: sage-backend-win7
          channels: conda-forge,defaults

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py38-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-py38-

      - name: Install dev tools
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 pip install -r backend/requirements.txt ruff mypy import-linter

      - name: Ruff check
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 ruff check backend/

      - name: Mypy (domain + ports, py38)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 mypy backend/domain backend/ports
        continue-on-error: true

      - name: Import linter (hexagonal architecture)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 bash -c "cd backend && PYTHONPATH=.. lint-imports"

      - name: Pytest hex (default) with coverage
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 bash -c "cd backend && pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=80"

      - name: Pytest legacy (smoke, no-cov)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 bash -c "cd backend && API_MODE=legacy pytest --no-cov -q"
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend-win7
          fail_ci_if_error: false

  # ========== Frontend: Node 20 LTS + build + lint + test ==========
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage/coverage-final.json
          flags: frontend-win7
          fail_ci_if_error: false

  # ========== Tauri 1.6 cross-build (interim mode) ==========
  # 现状：无 Win7 self-hosted runner，使用 GH-hosted windows-latest (Server 2022) cross-build
  # 跳过 sage.exe 冒烟测试（启动验证需在真实 Win7 物理机人工执行）
  # 详见 BRANCH_NOTES.md §"本分支的特殊性 §1" + Phase 4 roadmap
  tauri-win7-build:
    name: Tauri 1.6 build (cross-build, Win7 冒烟需人工)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Rust 1.77.2 是 Win7 x86 workaround（issue #11381 社区方案）
      # cross-build 在 Server 2022 上进行，target 需 x86_64-pc-windows-msvc
      - name: Install Rust 1.77.2
        uses: dtolnay/rust-toolchain@1.77.2
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Build frontend
        shell: pwsh
        run: npm run build

      # Tauri 1.6 build:
      #   - webviewInstallMode=offlineInstaller: Tauri 自动从微软下载 WebView2 standalone
      #     installer (~127MB) 并 embed 到 MSI/NSIS（仅 build 时联网，运行时完全离线）
      #   - targets: msi + nsis 给用户两种选择
      # 注：此 build 在 Server 2022 上进行，编译产物**配置**为 Win7 兼容
      #   （tauri=1.6 + windows7-compat + WebView2 v109 fallback）
      #   但 Server 2022 本身不验证 Win7 启动行为，需 Win7 物理机人工测试
      - name: Build Tauri (offline WebView2)
        shell: pwsh
        # CARGO_FLAGS 透传给底层 cargo build (Tauri 2.1+ 支持)
        # 锁住 Cargo.lock 防止 cargo 自由解析时再次拉入 edition2024 依赖
        # 详见 docs/superpowers/plans/2026-06-13-tauri-2.1.1-zeroize-edition2024-fix.md
        run: $env:CARGO_FLAGS="--locked"; npx tauri build --bundles msi,nsis

      - name: Verify sage.exe exists
        shell: pwsh
        run: |
          if (Test-Path "src-tauri\target\release\sage.exe") {
            Write-Host "sage.exe built successfully"
            Get-Item "src-tauri\target\release\sage.exe" | Format-List
          } else {
            Write-Error "sage.exe not found"
            exit 1
          }

      # 跳过 sage.exe 启动冒烟的原因：
      #   - WebView2 v109 fallback 行为只在 Win7 上触发
      #   - Server 2022 上无法验证 Win7 特定行为（KERNEL32.dll patch、TLS 1.2、UAC、DPI）
      #   - Win7 启动验证是 manual step：下载 artifact 到 Win7 物理机双击运行
      - name: Print manual Win7 verification instructions
        if: success()
        shell: pwsh
        run: |
          Write-Host "============================================"
          Write-Host "  Win7 实机验证（手动步骤）"
          Write-Host "============================================"
          Write-Host "CI 仅完成 cross-build。Win7 启动验证需在物理机执行："
          Write-Host "  1. 下载 artifact: sage-win7-installer"
          Write-Host "  2. 拷贝到 Windows 7 SP1 x64 物理机"
          Write-Host "  3. 双击 .msi 或 .exe 验证安装"
          Write-Host "  4. 启动 sage.exe 验证主窗口出现"
          Write-Host "  5. 确认 WebView2 v109 自动安装（MSI/EXE 内嵌）"
          Write-Host "============================================"

      - name: Upload Win7 installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sage-win7-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ========== All-checks aggregator (强门禁) ==========
  all-green:
    name: All Checks
    needs: [backend-py38, frontend, tauri-win7-build]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend-py38.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.tauri-win7-build.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required checks passed for release/win7"
