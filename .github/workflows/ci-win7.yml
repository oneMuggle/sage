# Sage Windows 7 维护分支 CI
#
# 仅在 release/win7 分支生效的 CI：
#   1. backend-py38: Python 3.8 验证（conda env name: sage-backend-win7）
#   2. frontend: Node 20 LTS（Win7 兼容，**不是** Node 25）
#   3. tauri-win7-build: self-hosted windows-7 runner 上跑 Tauri 1.6 build + 10s 冒烟
#
# 设计原则：
#   - 三个 job 全部为强门禁（all-green 才算通过）
#   - tauri-win7-build 是 self-hosted runner（label: windows-7），不在 GH-hosted 跑
#   - Node 选 20 而非 25：Node 23+ 编译产物在 Win7 上可能有问题，20 是 LTS 且安全
#   - Python 3.8 是 Win7 最后支持版本，conda env 需独立创建

name: CI (Windows 7)

on:
  push:
    branches: [release/win7]
  pull_request:
    branches: [release/win7]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========== Backend: Python 3.8 + coverage 80% ==========
  backend-py38:
    name: Backend (Python 3.8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda (Python 3.8)
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.8'
          activate-environment: sage-backend-win7
          channels: conda-forge,defaults

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py38-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-py38-

      - name: Install dev tools
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 pip install ruff mypy import-linter

      - name: Ruff check
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 ruff check backend/

      - name: Mypy (domain + ports, py38)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 mypy backend/domain backend/ports
        continue-on-error: true

      - name: Import linter (hexagonal architecture)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 bash -c "cd backend && PYTHONPATH=.. lint-imports"

      - name: Pytest hex (default) with coverage
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 bash -c "cd backend && pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=80"

      - name: Pytest legacy (smoke, no-cov)
        shell: bash -el {0}
        run: |
          conda run -n sage-backend-win7 bash -c "cd backend && API_MODE=legacy pytest --no-cov -q"
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend-win7
          fail_ci_if_error: false

  # ========== Frontend: Node 20 LTS + build + lint + test ==========
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage/coverage-final.json
          flags: frontend-win7
          fail_ci_if_error: false

  # ========== Tauri 1.6 build on self-hosted Win7 runner ==========
  # 必须有 runner label: windows-7
  tauri-win7-build:
    name: Tauri 1.6 build (Windows 7 self-hosted)
    runs-on: [self-hosted, windows-7]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Rust 1.77.2 是 Win7 x86 workaround（issue #11381 社区方案）
      - name: Install Rust 1.77.2
        uses: dtolnay/rust-toolchain@1.77.2
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Build frontend
        shell: pwsh
        run: npm run build

      # Tauri 1.6 build:
      #   - webviewInstallMode=offlineInstaller: Tauri 自动从微软下载 WebView2 standalone
      #     installer (~127MB) 并 embed 到 MSI/NSIS（仅 build 时联网，运行时完全离线）
      #   - targets: msi + nsis 给用户两种选择
      - name: Build Tauri (offline WebView2)
        shell: pwsh
        run: npx tauri build --bundles msi,nsis

      - name: Verify sage.exe exists
        shell: pwsh
        run: |
          if (Test-Path "src-tauri\target\release\sage.exe") {
            Write-Host "sage.exe built successfully"
            Get-Item "src-tauri\target\release\sage.exe" | Format-List
          } else {
            Write-Error "sage.exe not found"
            exit 1
          }

      - name: Smoke test launch (10 sec, then kill)
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "src-tauri\target\release\sage.exe" -PassThru
          Start-Sleep -Seconds 10
          if (-not $proc.HasExited) {
            Write-Host "sage.exe still running after 10s — Win7 launch successful"
            Stop-Process -Id $proc.Id -Force
          } else {
            Write-Error "sage.exe crashed within 10s (exit code: $($proc.ExitCode))"
            exit 1
          }

      - name: Upload Win7 installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sage-win7-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ========== All-checks aggregator (强门禁) ==========
  all-green:
    name: All Checks
    needs: [backend-py38, frontend, tauri-win7-build]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend-py38.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.tauri-win7-build.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required checks passed for release/win7"
