# Release Workflow — 自动化构建 + 上传 Electron 应用到 GitHub Release
#
# 触发条件: push tag 形如 v* (如 v0.2.0, v1.0.0-beta.1)
#
# ⚠️ Win7 LTS 专用 installer 改由 release-win7.yml 在 release/win7 分支产出
#    tag 格式: v*-win7 (如 v0.5.0-alpha.1-win7)
#    下载入口: https://github.com/oneMuggle/sage/releases?q=tag%3Av*-win7
#
# 工作流:
#   1. checkout 代码
#   2. setup Node.js + cache npm + electron-builder downloads
#   3. 安装 Linux 构建依赖
#   4. 构建前端 + Electron (npm run electron:build)
#   5. electron-builder 跨平台构建 (linux AppImage/deb + windows NSIS)
#   6. 上传产物到 GitHub Release (由本次 push tag 自动创建)
#
# 产物格式 (来自 electron-builder.yml):
#   - Sage-${version}.AppImage              (Linux)
#   - sage_${version}_amd64.deb             (Linux Debian)
#   - Sage-Setup-${version}.exe             (Windows NSIS, Win10+ 默认)
#
# Win7 LTS 用户的 -win7 后缀产物由 release-win7.yml 在 release/win7 分支产出
# (如 Sage-Setup-0.5.0-alpha.1-win7.exe)。
#
# 失败处理: tag push 后 workflow 失败, 需人工:
#   1. git tag -d v<X.Y.Z> && git push origin :v<X.Y.Z>  # 删除坏 tag
#   2. 修 workflow, 重新打 tag

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 必需: gh release upload 需要 write 权限

jobs:
  build:
    name: Build (${{ matrix.os }})
    # Skip LTS-suffixed tags — those go to release-win7.yml
    if: "!contains(github.ref_name, '-lts') && !contains(github.ref_name, '-win7')"
    strategy:
      fail-fast: false
      matrix:
        # macOS DMG 暂未启用 (electron-builder.yml mac.target: null)
        # 待 Win7 验证后补回
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    # Note: main's electron-builder.yml no longer uses ${env.ARTIFACT_SUFFIX}
    # in artifactName (commit 1a9dc5a simplified this). win7 LTS suffix is
    # handled in release-win7.yml's own electron-builder.yml (literal '-win7').

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ contains(github.ref_name, '-') && 'prerelease-' || '' }}${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Linux build deps (webkit2gtk for Electron)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64

      - name: Install npm dependencies
        run: npm ci --force

      - name: Build frontend + Electron
        run: npm run electron:build

      - name: Build Linux (AppImage + deb)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux AppImage deb --publish never

      - name: Fetch VC++ Redistributable (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: pwsh scripts/fetch-vcredist.ps1

      - name: Build Windows (NSIS installer)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis --publish never

      - name: Detect rc.1 and create stabilization branch
        if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref_name, '-rc.1') && !endsWith(github.ref_name, '-rc.1-win7')
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/-rc\.1$//' | sed 's/^v//')
          python scripts/release/release_branches.py create \
            --tier rc --tag ${{ github.ref_name }} --version $VERSION
        env:
          SAGE_RELEASE_BOT_TOKEN: ${{ secrets.SAGE_RELEASE_BOT_TOKEN }}

      - name: Promote release/stable mirror on stable tag
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') && !endsWith(github.ref_name, '-win7')
        run: |
          python scripts/release/release_branches.py promote-stable \
            --tier stable --tag ${{ github.ref_name }}
        env:
          SAGE_RELEASE_BOT_TOKEN: ${{ secrets.SAGE_RELEASE_BOT_TOKEN }}

      - name: Finalize stabilization branch on stable ship
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') && !endsWith(github.ref_name, '-win7')
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          python scripts/release/release_branches.py finalize \
            --version $VERSION --main-branch main
        env:
          SAGE_RELEASE_BOT_TOKEN: ${{ secrets.SAGE_RELEASE_BOT_TOKEN }}

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*/Sage-*.AppImage
            release/*/sage_*_amd64.deb
            release/*/Sage-Setup-*.exe
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## 🧪 Sage ${{ github.ref_name }}

            > **This is a ${{ contains(github.ref_name, '-alpha') && 'ALPHA' || contains(github.ref_name, '-beta') && 'BETA' || contains(github.ref_name, '-rc') && 'RELEASE CANDIDATE' || 'STABLE' }} release.**
            > ${{ contains(github.ref_name, '-alpha') && '⚠️ 仅供 Sage 贡献者使用，可能含已知 bug。' || contains(github.ref_name, '-beta') && '⚠️ 公开测试版，欢迎反馈 issue。' || contains(github.ref_name, '-rc') && '✅ 准稳定版，推荐广泛测试。' || '✅ 稳定版，推荐所有用户升级。' }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
