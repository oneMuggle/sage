# Sage Windows 构建工作流
# 构建自定义 NSIS 安装包 (.exe) - 含 WebView2 v109 离线嵌入

name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  # Windows NSIS 安装包构建
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 安装前端依赖
      run: npm ci

    - name: 构建前端
      run: npm run build

    - name: 安装 Rust (Win7 兼容版本)
      uses: dtolnay/rust-toolchain@1.77.2
      with:
        targets: x86_64-pc-windows-msvc

    - name: 安装 Visual Studio Build Tools
      uses: egor-tensin/vs-setup@v3
      with:
        components: Desktop development with C++

    - name: 缓存 Rust 依赖
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri/target

    - name: 下载 WebView2 v109 (Win7 兼容离线安装包)
      id: download-webview2
      run: |
        mkdir src-tauri\resources
        $out = "src-tauri\resources\WebView2Runtime_109.exe"
        $success = $false

        # --- 源 1: 微软固定版本直链 ---
        Write-Host "[1/3] 尝试微软固定版本直链..."
        try {
          Invoke-WebRequest -Uri "https://msedge.sf.dl.delivery.mp.microsoft.com/filestreamingservice/files/3b009565-19ab-4705-a7a3-5e1bf88e1341/MicrosoftEdgeWebView2RuntimeInstaller_x64_109.0.1518.78.exe" -OutFile $out -UseBasicParsing -TimeoutSec 60
          if ((Get-Item $out).Length -gt 10MB) {
            Write-Host "成功: $((Get-Item $out).Length / 1MB)MB"
            $success = $true
          }
        } catch { Write-Host "失败: $_" }

        # --- 源 2: 本仓库 GitHub Releases ---
        if (-not $success -and $env:GITHUB_TOKEN) {
          Write-Host "[2/3] 尝试本仓库 Releases..."
          $headers = @{ Authorization = "token $env:GITHUB_TOKEN" }
          try {
            $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases" -Headers $headers
            foreach ($release in $releases) {
              foreach ($asset in $release.assets) {
                if ($asset.name -eq 'WebView2Runtime_109.exe') {
                  Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $out -Headers $headers -UseBasicParsing -TimeoutSec 60
                  if ((Get-Item $out).Length -gt 10MB) {
                    Write-Host "成功 (来自 Release '$($release.tag_name)'): $((Get-Item $out).Length / 1MB)MB"
                    $success = $true
                    break
                  }
                }
              }
              if ($success) { break }
            }
          } catch { Write-Host "失败: $_" }
        }

        # --- 源 3: 仓库内文件 (git commit 提交) ---
        if (-not $success) {
          Write-Host "[3/3] 检查仓库内文件..."
          if (Test-Path "src-tauri\resources\WebView2Runtime_109.exe") {
            Write-Host "成功 (已在仓库中): $((Get-Item 'src-tauri\resources\WebView2Runtime_109.exe').Length / 1MB)MB"
            $success = $true
          } else {
            Write-Host "仓库内未找到文件"
          }
        }

        if (-not $success) {
          Write-Host "::error::所有 WebView2 下载源均失败。请手动下载 v109 离线安装包并:"
          Write-Host "  1. 提交到 src-tauri/resources/WebView2Runtime_109.exe，或"
          Write-Host "  2. 上传到 GitHub Release 并命名为 WebView2Runtime_109.exe"
          exit 1
        }
      shell: powershell
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 安装 NSIS
      run: choco install nsis --no-progress
      shell: powershell

    - name: 锁定依赖版本 (Win7 兼容)
      working-directory: src-tauri
      run: |
        # 先锁定底层包，再锁定上层包，避免解析器拉入新版本
        cargo update -p idna_adapter --precise 1.2.0
        cargo update -p ignore --precise 0.4.20
        cargo update -p globset --precise 0.4.14
        cargo update -p ahash --precise 0.8.11
        cargo update -p tempfile --precise 3.15.0
        cargo update -p uuid --precise 1.12.1
        cargo update -p plist --precise 1.7.4
        cargo update -p serde_with --precise 3.16.1
        cargo update -p time --precise 0.3.41
        cargo update -p embed-resource --precise 2.4.0
        cargo update -p litemap --precise 0.7.3
        cargo update -p native-tls --precise 0.2.12
        cargo update -p unicode-segmentation --precise 1.12.0

    - name: 提取版本号
      id: version
      run: |
        if ($env:GITHUB_REF -match '^refs/tags/') {
          $ver = $env:GITHUB_REF -replace '^refs/tags/v?', ''
        } else {
          $ver = '${{ github.event.inputs.version }}'
        }
        Write-Host "VERSION=$ver"
        echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
      shell: powershell

    - name: 编译 Rust Release
      run: cargo build --release
      working-directory: src-tauri

    - name: 编译自定义 NSIS 安装包
      run: |
        makensis /V3 /DVERSION=${{ steps.version.outputs.VERSION }} installer.nsi
      shell: powershell
      working-directory: src-tauri

    - name: 上传安装包
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: src-tauri/target/release/Sage_${{ steps.version.outputs.VERSION }}_x64-setup.exe
        if-no-files-found: error

    - name: 上传构建日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: src-tauri/target/x86_64-pc-windows-msvc/release/**/*.log
        if-no-files-found: ignore

  # 创建 GitHub Release
  release:
    name: Create Release
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 下载安装包
      uses: actions/download-artifact@v4
      with:
        name: windows-installer
        path: installer

    - name: 获取版本号
      id: get_version
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG:-${{ github.event.inputs.version }}}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: 创建 Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: installer/*.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
