# Sage Windows 构建工作流
# 构建 NSIS 安装包 (.exe)

name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  # Windows NSIS 安装包构建
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: 安装前端依赖
      run: npm ci
    
    - name: 构建前端
      run: npm run build
    
    - name: 安装 Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc
    
    - name: 安装 Visual Studio Build Tools
      uses: egor-tensin/vs-setup@v3
      with:
        components: Desktop development with C++
    
    - name: 缓存 Rust 依赖
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri/target
    
    - name: 安装 Tauri CLI
      run: npm install -g @tauri-apps/cli@1
    
    - name: 构建 Tauri (Release)
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: --release
      # 注意: 这会生成:
      # - src-tauri/target/x86_64-pc-windows-msvc/release/Sage.exe
      # - src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
    
    - name: 上传安装包
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: |
          src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          src-tauri/target/x86_64-pc-windows-msvc/release/Sage.exe
        if-no-files-found: warn
    
    - name: 上传构建日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: src-tauri/target/x86_64-pc-windows-msvc/release/**/*.log
        if-no-files-found: ignore

  # 创建 GitHub Release
  release:
    name: Create Release
    needs: build-windows
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 下载安装包
      uses: actions/download-artifact@v4
      with:
        name: windows-installer
        path: installer
    
    - name: 获取版本号
      id: get_version
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG:-${github.event.inputs.version}}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
    
    - name: 创建 Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: installer/*.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
