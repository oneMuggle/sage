# PR labeler 配置: PR target branch 为 release/v* 时强制 fix: 或 hotfix: label
# 配合 .github/workflows/pr-label-check.yml 实现强制
#
# 详细规则 (匹配条件):
#   1. PR base branch starts with 'release/v'
#   2. PR has at least one label in {fix:, hotfix:}
#   否则 CI 红

release-branch-base:
  baseBranches:
    - release/v*

required-labels:
  any-of:
    - fix:
    - hotfix:
  applies-to:
    - release-branch-base