# lefthook.yml
pre-commit:
  parallel: true
  commands:
    backend-lint:
      glob: 'backend/**/*.py'
      run: bash scripts/lint.sh check --fix {staged_files}
    backend-format:
      glob: 'backend/**/*.py'
      run: bash scripts/lint.sh format {staged_files}
    frontend-lint:
      glob: 'src/**/*.{ts,tsx}'
      run: npx eslint --fix {staged_files}
    frontend-format:
      glob: 'src/**/*.{ts,tsx}'
      run: npx prettier --write {staged_files}

pre-push:
  commands:
    lockfile-check:
      # Catch package.json / package-lock.json drift BEFORE pushing,
      # so CI fails fast (and locally first) instead of after a wasted
      # npm ci on every job. Mirrors the 'Verify lockfile sync' step
      # added in .github/workflows/ci.yml.
      run: npm ci --dry-run
    backend-test:
      run: cd backend && bash ../scripts/pytest.sh -x --no-cov
    frontend-test:
      run: npm run test:run -- --no-coverage

post-merge:
  commands:
    deps-install:
      run: npm install
